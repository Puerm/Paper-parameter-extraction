<h2>活泼到什么程度？</h2>
<p class="subtitle">科研工具需要正经，但也可以有趣。选一个最顺眼的。</p>

<div class="options">
  <div class="option" data-choice="medium" onclick="toggleSelect(this)">
    <div class="letter">A</div>
    <div class="content">
      <h3>收敛活泼 · 轻彩</h3>
      <p>主色用紫蓝色渐变+珊瑚点缀。白色卡片+彩色操作区。侧栏用浅色渐变替代纯色。</p>
      <p style="margin-top:6px;font-size:12px;color:#888">动效只出现在关键操作：提交、状态变更、页面切换</p>
    </div>
  </div>
  <div class="option" data-choice="bold" onclick="toggleSelect(this)">
    <div class="letter">B</div>
    <div class="content">
      <h3>大胆活泼 · 撞色</h3>
      <p>深色渐变侧栏，亮色按钮，卡片带彩色边框或角标。每个页面都有专属品牌色。</p>
      <p style="margin-top:6px;font-size:12px;color:#888">动效更丰富：hover 放大、列表入场动画、背景微粒子</p>
    </div>
  </div>
  <div class="option" data-choice="whimsical" onclick="toggleSelect(this)">
    <div class="letter">C</div>
    <div class="content">
      <h3>玩心 · 有梗</h3>
      <p>空状态有插画和幽默文案，loading 有小动画，成功/失败有表情化反馈。色彩丰富但克制。</p>
      <p style="margin-top:6px;font-size:12px;color:#888">适合"苦中作乐"的科研氛围</p>
    </div>
  </div>
</div>
